---
- name: Install Nginx and start on web
  hosts: web
  become: true

  tasks: 
    - name: System Update "apt-get update"
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: start and enabled the service
      service:
        name: nginx
        state: started
        enabled: true

    - name: Create custom index page
      copy:
        content: "<h1>Deployed by Ansible - TerraWeek Server</h1>"
        dest: /var/www/html/index.html